<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>👀</text></svg>"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Speed reading app." />
    <title>Speed Reader</title>

    <!-- Apply theme before React loads to prevent flash -->
    <script>
      (function () {
        switch (localStorage.getItem('speedreader.theme')) {
          case 'light':
            break;
          case 'dark':
            document.documentElement.classList.add('dark');
            break;
          case 'system':
          default:
            if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
              document.documentElement.classList.add('dark');
            }
        }
      })();
    </script>

    <!--
      GitHub Corners. See https://github.com/remarkablemark/github-corners
    -->
    <script
      src="https://unpkg.com/github-corners/dist/embed.min.js"
      data-href="https://github.com/remarkablemark/speedreader"
      data-target="_blank"
      async
      defer
    ></script>
    <script type="module" crossorigin src="/speedreader/assets/index-Dt5PR2hw.js"></script>
    <link rel="modulepreload" crossorigin href="/speedreader/assets/rolldown-runtime-Cr0BHlHC.js">
    <link rel="modulepreload" crossorigin href="/speedreader/assets/react-Y3w7ZS93.js">
    <link rel="stylesheet" crossorigin href="/speedreader/assets/index-CNhdHHjV.css">
  </head>
  <body class="bg-neutral-50 dark:bg-slate-900 dark:text-slate-50">
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
</html>
